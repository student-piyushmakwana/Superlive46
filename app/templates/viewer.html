<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superlive Premium Viewer</title>
    <!-- Mukta Font & Material Symbols Rounded -->
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.2.js"></script>
    <style>
        :root {
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            --md-sys-color-secondary: #CCC2DC;
            --md-sys-color-on-secondary: #332D41;
            --md-sys-color-surface: #1C1B1F;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-variant: #49454F;
            --md-sys-color-on-surface-variant: #CAC4D0;
            --md-sys-color-outline: #938F99;
            --md-sys-color-error: #F2B8B5;
            --font-display: 'Mukta', sans-serif;
            --font-body: 'Mukta', sans-serif;
        }

        * {
            box-sizing: border-box;
            font-family: var(--font-body);
        }

        body {
            margin: 0;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar */
        .top-app-bar {
            height: 64px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--md-sys-color-surface);
            border-bottom: 1px solid var(--md-sys-color-surface-variant);
            z-index: 10;
        }

        .top-app-bar h1 {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* Main Content */
        .main-container {
            flex: 1;
            display: flex;
            padding: 24px;
            gap: 24px;
            height: calc(100vh - 64px);
            overflow: hidden;
        }

        /* Responsive Layout */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                padding: 16px;
                overflow-y: auto;
                height: auto;
            }

            .sidebar {
                width: 100% !important;
                order: 2;
            }

            .viewport-container {
                width: 100%;
                aspect-ratio: 16/9;
                flex: none !important;
                height: auto !important;
                order: 1;
            }
        }

        /* Sidebar/Controls */
        .sidebar {
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background-color: #25232a;
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* M3 Input Field */
        .input-group {
            position: relative;
            width: 100%;
        }

        .text-field {
            width: 100%;
            background-color: var(--md-sys-color-surface-variant);
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: var(--md-sys-color-on-surface);
            font-size: 16px;
            transition: all 0.2s;
        }

        .text-field:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--md-sys-color-primary);
        }

        /* M3 Button */
        .btn-filled {
            height: 56px;
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            border-radius: 16px;
            padding: 0 24px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .btn-filled:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(208, 188, 255, 0.3);
        }

        /* Viewport */
        .viewport-container {
            flex: 1;
            background-color: #000;
            border-radius: 28px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #remote-player {
            width: 100%;
            height: 100%;
            transition: filter 0.3s;
        }

        .blur-active {
            filter: blur(40px);
        }

        /* Player Controls */
        .player-controls {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            background: rgba(28, 27, 31, 0.85);
            padding: 12px;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .viewport-container:hover .player-controls {
            opacity: 1;
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .icon-btn.active {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }

        #status-chip {
            position: absolute;
            top: 24px;
            right: 24px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(8px);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #aaa;
            box-shadow: 0 0 8px rgba(170, 170, 170, 0.5);
        }

        .dot.online {
            background: #4caf50;
            box-shadow: 0 0 12px rgba(76, 175, 80, 0.8);
        }

        /* Footer / Signature */
        .signature {
            margin-top: auto;
            text-align: center;
            padding: 16px;
            font-size: 14px;
            color: var(--md-sys-color-on-surface-variant);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .signature:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(208, 188, 255, 0.2);
        }

        .text-part {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .signature .heart {
            color: #ff4081;
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 6px rgba(255, 64, 129, 0.6));
            font-size: 16px;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.25);
            }
        }

        .piyush-brand {
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #D0BCFF 0%, #F2B8B5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            position: relative;
        }
        
        .piyush-brand::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(135deg, #D0BCFF 0%, #F2B8B5 100%);
            border-radius: 2px;
            opacity: 0.5;
        }

        /* Mini Window */
        .mini-mode {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 340px;
            height: 200px;
            z-index: 1000;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);
            border: 2px solid var(--md-sys-color-primary);
        }

        /* Search Results */
        .search-results {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 280px;
            overflow-y: auto;
        }

        .search-results::-webkit-scrollbar {
            width: 4px;
        }

        .search-results::-webkit-scrollbar-track {
            background: transparent;
        }

        .search-results::-webkit-scrollbar-thumb {
            background: var(--md-sys-color-outline);
            border-radius: 4px;
        }

        .user-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
        }

        .user-result-item:hover {
            background: rgba(208, 188, 255, 0.1);
            border-color: var(--md-sys-color-primary);
        }

        .user-result-item img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1.5px solid var(--md-sys-color-primary);
        }

        .user-result-info {
            flex: 1;
            min-width: 0;
        }

        .user-result-name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-result-sub {
            font-size: 12px;
            color: var(--md-sys-color-on-surface-variant);
        }

        .live-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            background: #e91e63;
            color: #fff;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }

        .no-results {
            text-align: center;
            padding: 16px;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 13px;
        }
    </style>
</head>

<body>
    <header class="top-app-bar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span class="material-symbols-rounded"
                style="color: var(--md-sys-color-primary); font-size: 32px;">stream</span>
            <h1>Superlive Premium</h1>
        </div>
        <div id="status-text" style="font-size: 13px; color: var(--md-sys-color-primary); font-weight: 700; background: rgba(208, 188, 255, 0.12); border: 1px solid rgba(208, 188, 255, 0.25); padding: 4px 10px; border-radius: 8px; letter-spacing: 1px; display: flex; align-items: center; justify-content: center;">
            PVT
        </div>
    </header>

    <main class="main-container">
        <aside class="sidebar">
            <div class="card">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 4px;">
                    <span class="material-symbols-rounded"
                        style="color: var(--md-sys-color-primary)">person_search</span>
                    <span style="font-weight: 700; font-size: 16px;">Find a Streamer</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <div class="input-group" style="flex: 1;">
                        <input type="text" id="search-query" class="text-field" placeholder="Search by name or user ID"
                            onkeydown="if(event.key==='Enter') searchUsers()">
                    </div>
                    <button class="btn-filled" onclick="searchUsers()"
                        style="flex-shrink: 0; width: 56px; padding: 0; border-radius: 12px;">
                        <span class="material-symbols-rounded">search</span>
                    </button>
                </div>
                <div id="search-results-container" style="display: none;">
                    <div class="search-results" id="search-results-list"></div>
                </div>
            </div>

            <div class="card" id="recent-pvts-card" style="display: none;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="material-symbols-rounded" style="color: var(--md-sys-color-primary)">history</span>
                        <span style="font-weight: 700; font-size: 16px;">Recent Pvts</span>
                    </div>
                    <button class="icon-btn" onclick="clearRecentPvts()" title="Clear Recent" style="width: 36px; height: 36px;">
                        <span class="material-symbols-rounded" style="font-size: 18px;">delete</span>
                    </button>
                </div>
                <div class="search-results" id="recent-pvts-list"></div>
            </div>

            <div id="info-card" class="card" style="display: none;">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <img id="avatar" src=""
                        style="width: 56px; height: 56px; border-radius: 16px; object-fit: cover; border: 2px solid var(--md-sys-color-primary);">
                    <div>
                        <div id="streamer-name" style="font-weight: 700; font-size: 18px;">Username</div>
                        <div id="viewers" style="font-size: 13px; color: var(--md-sys-color-on-surface-variant)">0
                            Viewers</div>
                    </div>
                </div>
                <div id="headline"
                    style="font-size: 14px; line-height: 1.4; color: var(--md-sys-color-on-surface-variant)"></div>
            </div>

            <footer class="signature">
                <div class="text-part">Developed with <span class="heart">❤️</span> by</div>
                <div class="piyush-brand">PIYUSH</div>
            </footer>
        </aside>

        <section class="viewport-container" id="viewport">
            <div id="remote-player"></div>
            <div id="placeholder"></div>

            <div id="status-chip">
                <div class="dot" id="status-dot"></div>
                <span id="status-label">Idle</span>
            </div>

            <div class="player-controls">
                <button class="icon-btn" onclick="toggleMute()" title="Mute/Unmute">
                    <span class="material-symbols-rounded" id="mute-icon">volume_up</span>
                </button>
                <button class="icon-btn" onclick="toggleBlur()" title="Blur/Unblur">
                    <span class="material-symbols-rounded" id="blur-icon">blur_on</span>
                </button>
                <button class="icon-btn" onclick="toggleMini()" title="Mini/Full Window">
                    <span class="material-symbols-rounded" id="mini-icon">picture_in_picture_alt</span>
                </button>
                <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen">
                    <span class="material-symbols-rounded">fullscreen</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        // ── Superlive Viewer ───────────────────────────────────────────────────────
        // Handles: user search, stream retrieve, Agora join, and player controls.

        const AGORA_APP_ID = "466f7443143a3df42868339f73e53887";
        const client = AgoraRTC.createClient({ mode: "live", codec: "h264" });
        let remoteUser = null;
        let isMuted = false;
        let isBlurred = false;
        let isMini = false;

        // ── API helper ────────────────────────────────────────────────────────────
        async function apiPost(endpoint, body) {
            const resp = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            const rawText = await resp.text();
            console.log(`[api] ${endpoint} →`, rawText || "(empty)");
            if (!rawText) throw new Error(`Server returned empty response from ${endpoint}. Check server logs.`);
            const data = JSON.parse(rawText);
            if (!resp.ok) throw new Error(data.error || data.message || `HTTP ${resp.status}`);
            return data;
        }

        // ── Step 1: Search users ───────────────────────────────────────────────────
        async function searchUsers() {
            const query = document.getElementById("search-query").value.trim();
            if (!query) return;

            const statusLabel = document.getElementById("status-label");
            statusLabel.innerText = "Searching...";

            try {
                const data = await apiPost("/api/users/search", { search_query: query });
                const items = data.upstream_response?.items || [];
                renderSearchResults(items);
                
                if (items.length > 0) {
                    let matchedUser = items.find(u => u.user_id.toString() === query) || items[0];
                    addToRecent(matchedUser);
                }

                statusLabel.innerText = "Idle";
            } catch (err) {
                console.error(err);
                statusLabel.innerText = "Error";
                alert("Search failed: " + err.message);
            }
        }

        function renderSearchResults(users) {
            const container = document.getElementById("search-results-container");
            const list = document.getElementById("search-results-list");
            list.innerHTML = "";

            if (!users.length) {
                list.innerHTML = '<div class="no-results">No users found</div>';
                container.style.display = "block";
                return;
            }

            users.forEach(user => {
                const isLive = !!user.livestream_id;
                const item = document.createElement("div");
                item.className = "user-result-item";
                item.innerHTML = `
                    <img src="${user.profile_image?.thumbnail_url || ""}" onerror="this.src=''"
                        style="background: #49454F;">
                    <div class="user-result-info">
                        <div class="user-result-name">${user.name || "Unknown"}</div>
                        <div class="user-result-sub">Lv.${user.level || 0} · ID: ${user.user_id}</div>
                    </div>
                    ${isLive ? '<span class="live-badge">LIVE</span>' : ""}
                `;
                if (isLive) {
                    item.onclick = () => fetchAndPlay(user.livestream_id, user);
                } else {
                    item.style.opacity = "0.5";
                    item.style.cursor = "default";
                    item.title = "User is not live";
                }
                list.appendChild(item);
            });

            container.style.display = "block";
        }

        // ── Step 2: Fetch stream details and join ─────────────────────────────────
        async function fetchAndPlay(livestreamId, userData) {
            const statusLabel = document.getElementById("status-label");
            const statusDot = document.getElementById("status-dot");
            statusLabel.innerText = "Connecting...";

            try {
                const payload = { livestream_id: livestreamId };
                if (userData && userData.auth_token) {
                    payload.auth_token = userData.auth_token;
                }
                
                const data = await apiPost("/api/livestream/retrieve", payload);

                const streamDetails = data.upstream_response?.stream_details || data.stream_details;
                const user = data.upstream_response?.user || userData || {};

                if (!streamDetails) throw new Error("No stream_details in response");

                updateUI({ stream_details: streamDetails, user });
                joinStream(AGORA_APP_ID, streamDetails);

            } catch (err) {
                console.error(err);
                statusLabel.innerText = "Error";
                statusDot.className = "dot";
                alert("Failed to load stream: " + err.message);
            }
        }

        // ── UI update ─────────────────────────────────────────────────────────────
        function updateUI(data) {
            document.getElementById("info-card").style.display = "flex";
            document.getElementById("streamer-name").innerText = data.user?.name || "Unknown";
            document.getElementById("viewers").innerText = (data.stream_details?.viewer_count || 0) + " Viewers";
            document.getElementById("headline").innerText = data.stream_details?.headline || "";
            document.getElementById("avatar").src = data.user?.profile_image?.thumbnail_url || "";
        }

        // ── Agora join ────────────────────────────────────────────────────────────
        async function joinStream(appId, details) {
            const statusLabel = document.getElementById("status-label");
            const statusDot = document.getElementById("status-dot");

            try {
                if (client.connectionState === "CONNECTED") await client.leave();
                await client.join(appId, details.channel_id, details.agora_channel_token, details.agora_id);
                statusLabel.innerText = "Live Now";
                statusDot.className = "dot online";
                document.getElementById("placeholder").style.display = "none";
            } catch (err) {
                console.error(err);
                statusLabel.innerText = "Failed";
            }
        }

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            remoteUser = user;
            if (mediaType === "video") {
                const container = document.getElementById("remote-player");
                container.innerHTML = "";
                user.videoTrack.play(container);
            }
            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });

        // ── Player controls ───────────────────────────────────────────────────────
        function toggleMute() {
            if (!remoteUser || !remoteUser.audioTrack) return;
            isMuted = !isMuted;
            remoteUser.audioTrack.setVolume(isMuted ? 0 : 100);
            document.getElementById("mute-icon").innerText = isMuted ? "volume_off" : "volume_up";
            document.getElementById("mute-icon").parentElement.classList.toggle("active", isMuted);
        }

        function toggleBlur() {
            isBlurred = !isBlurred;
            document.getElementById("remote-player").classList.toggle("blur-active", isBlurred);
            document.getElementById("blur-icon").innerText = isBlurred ? "blur_off" : "blur_on";
            document.getElementById("blur-icon").parentElement.classList.toggle("active", isBlurred);
        }

        function toggleMini() {
            isMini = !isMini;
            document.getElementById("viewport").classList.toggle("mini-mode", isMini);
            document.getElementById("mini-icon").innerText = isMini ? "fullscreen_exit" : "picture_in_picture_alt";
        }

        function toggleFullscreen() {
            const elem = document.getElementById("viewport");
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => alert(err.message));
            } else {
                document.exitFullscreen();
            }
        }

        // ── Recent Pvts ───────────────────────────────────────────────────────────
        function addToRecent(user) {
            let recents = JSON.parse(localStorage.getItem("recent_pvts") || "[]");
            recents = recents.filter(u => u.user_id !== user.user_id);
            recents.unshift(user);
            if (recents.length > 10) recents.pop();
            localStorage.setItem("recent_pvts", JSON.stringify(recents));
            loadRecentPvts();
        }

        function loadRecentPvts() {
            const recents = JSON.parse(localStorage.getItem("recent_pvts") || "[]");
            const card = document.getElementById("recent-pvts-card");
            const list = document.getElementById("recent-pvts-list");
            if (!card || !list) return;
            
            list.innerHTML = "";
            
            if (recents.length === 0) {
                card.style.display = "none";
                return;
            }
            card.style.display = "flex";
            
            recents.forEach(user => {
                const item = document.createElement("div");
                item.className = "user-result-item";
                item.innerHTML = `
                    <img src="${user.profile_image?.thumbnail_url || ""}" onerror="this.src=''"
                        style="background: #49454F;">
                    <div class="user-result-info">
                        <div class="user-result-name">${user.name || "Unknown"}</div>
                        <div class="user-result-sub">Lv.${user.level || 0} · ID: ${user.user_id}</div>
                    </div>
                    <span class="material-symbols-rounded" style="color: var(--md-sys-color-primary); font-size: 20px;">play_circle</span>
                `;
                item.onclick = () => playRecentUser(user);
                list.appendChild(item);
            });
        }

        async function playRecentUser(user) {
            document.getElementById("search-query").value = user.user_id;
            const statusLabel = document.getElementById("status-label");
            statusLabel.innerText = "Checking...";
            
            try {
                const data = await apiPost("/api/users/search", { search_query: user.user_id.toString() });
                const items = data.upstream_response?.items || [];
                if (items.length > 0) {
                    const freshUser = items.find(u => u.user_id === user.user_id) || items[0];
                    renderSearchResults(items);
                    if (freshUser.livestream_id) {
                        fetchAndPlay(freshUser.livestream_id, freshUser);
                    } else {
                        alert("User is not live currently.");
                        statusLabel.innerText = "Idle";
                    }
                } else {
                    alert("User not found.");
                    statusLabel.innerText = "Idle";
                }
            } catch (err) {
                console.error(err);
                statusLabel.innerText = "Error";
                alert("Failed to check user: " + err.message);
            }
        }

        function clearRecentPvts() {
            localStorage.removeItem("recent_pvts");
            loadRecentPvts();
        }

        document.addEventListener("DOMContentLoaded", loadRecentPvts);
    </script>
</body>

</html>
